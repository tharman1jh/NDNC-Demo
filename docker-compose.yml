services:
  wordpress:
    image: wordpress:latest
    ports:
      - "8888:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: ndnc
      WORDPRESS_SITEURL: http://localhost:8882
      WORDPRESS_HOME: http://localhost:8882
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: wordpress
      MYSQL_DATABASE: ndnc
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - ndnc_db_data:/var/lib/mysql

volumes:
  ndnc_db_data:
